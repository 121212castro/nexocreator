<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NexoCreator</title>
  <meta name="theme-color" content="#062033" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="NexoCreator" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/book-fish.svg" />
  <link rel="apple-touch-icon" href="icons/book-fish.svg" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="app">
    <section id="home"><div class="top"><img class="logo" src="icons/book-fish.svg" alt="NexoCreator"><div class="title">NEXOCREATOR</div><div class="sub">Creador independiente de fichas humanas y JSON</div></div><div class="card"><button class="primary" onclick="showNew()">➕ Nueva ficha</button><button onclick="showList()">📂 Mis fichas</button></div></section>
    <section id="newMenu" class="hidden card"><h2>Nueva ficha</h2><p class="muted">Elige cómo empezar. La foto quedará como portada inicial de la ficha.</p><label class="btn primary" for="cameraInput">📷 Hacer foto</label><input id="cameraInput" class="hidden" type="file" accept="image/*" capture="environment" onchange="startFromPhoto(event)"><label class="btn" for="galleryInput">🖼️ Elegir foto</label><input id="galleryInput" class="hidden" type="file" accept="image/*" onchange="startFromPhoto(event)"><button onclick="openEditor(newDraft())">✏️ Crear manualmente</button><button class="small" onclick="goHome()">← Volver</button></section>
    <section id="editor" class="hidden"><div class="card"><h2>Editor de ficha</h2><div id="coverBox"></div><div class="row"><label class="btn small" for="editorPhoto">🖼️ Cambiar foto</label><button class="small danger" onclick="removeCover()">🗑️ Borrar foto</button></div><input id="editorPhoto" class="hidden" type="file" accept="image/*" onchange="replaceCover(event)"><select id="category"><option value="pez_marino">🐠 Pez marino</option><option value="pez_dulce">🐟 Pez dulce</option><option value="coral">🪸 Coral</option><option value="invertebrado">🦐 Invertebrado</option><option value="planta">🌿 Planta</option><option value="microfauna">🧫 Microfauna</option><option value="sal">🧂 Sal</option><option value="medicamento">💊 Medicamento</option><option value="alimento">🍽️ Alimento</option><option value="equipamiento">⚙️ Equipamiento</option></select><input id="commonName" placeholder="Nombre común"><input id="scientificName" placeholder="Nombre científico"><textarea id="summary" placeholder="Resumen rápido"></textarea><textarea id="habitat" placeholder="Hábitat natural"></textarea><textarea id="aquarium" placeholder="Acuario recomendado"></textarea><textarea id="feeding" placeholder="Alimentación"></textarea><textarea id="compatibility" placeholder="Compatibilidad"></textarea><textarea id="health" placeholder="Salud"></textarea><textarea id="purchase" placeholder="Antes de comprar"></textarea><textarea id="mistakes" placeholder="Errores frecuentes"></textarea><textarea id="curiosities" placeholder="Curiosidades"></textarea><textarea id="sources" placeholder="Fuentes"></textarea><button class="primary" onclick="saveDraft()">💾 Guardar</button><div class="row"><button onclick="showPreview()">👁️ Vista humana</button><button onclick="exportCurrent()">📤 Exportar</button></div><button class="small" onclick="goHome()">← Volver</button></div></section>
    <section id="list" class="hidden card"></section><section id="preview" class="hidden card preview"></section><div class="footerSpace"></div>
  </div>
<script type="module" src="assets/js/app.js"></script>
<script>
const KEY='nexocreator_fichas_v1'; let current=null; function $(id){return document.getElementById(id)} function hideAll(){['home','newMenu','editor','list','preview'].forEach(id=>$(id).classList.add('hidden'))} function goHome(){hideAll();$('home').classList.remove('hidden')} function showNew(){hideAll();$('newMenu').classList.remove('hidden')}
function newDraft(){return {id:crypto.randomUUID?crypto.randomUUID():String(Date.now()),created_at:new Date().toISOString(),updated_at:new Date().toISOString(),category:'pez_marino',common_name:'',scientific_name:'',cover_image:'',sections:{summary:'',habitat:'',aquarium:'',feeding:'',compatibility:'',health:'',purchase:'',mistakes:'',curiosities:'',sources:''}}}
function readFile(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)})} async function startFromPhoto(ev){const file=ev.target.files[0]; if(!file)return; const d=newDraft(); d.cover_image=await readFile(file); openEditor(d); ev.target.value=''} async function replaceCover(ev){const file=ev.target.files[0]; if(!file)return; current.cover_image=await readFile(file); renderCover(); ev.target.value=''} function removeCover(){if(!current)return; current.cover_image=''; renderCover()}
function openEditor(d){current=d; hideAll(); $('editor').classList.remove('hidden'); $('category').value=d.category||'pez_marino'; $('commonName').value=d.common_name||''; $('scientificName').value=d.scientific_name||''; const s=d.sections||{}; ['summary','habitat','aquarium','feeding','compatibility','health','purchase','mistakes','curiosities','sources'].forEach(k=>$(k).value=s[k]||''); renderCover()} function renderCover(){ $('coverBox').innerHTML=current&&current.cover_image?`<img class="cover" src="${current.cover_image}" alt="portada">`:`<div class="placeholder">Sin foto de portada</div>` }
function collect(){current.category=$('category').value; current.common_name=$('commonName').value.trim(); current.scientific_name=$('scientificName').value.trim(); current.updated_at=new Date().toISOString(); current.sections={summary:$('summary').value,habitat:$('habitat').value,aquarium:$('aquarium').value,feeding:$('feeding').value,compatibility:$('compatibility').value,health:$('health').value,purchase:$('purchase').value,mistakes:$('mistakes').value,curiosities:$('curiosities').value,sources:$('sources').value}; return current} function saveDraft(){const d=collect(); let arr=all(); const i=arr.findIndex(x=>x.id===d.id); if(i>=0)arr[i]=d; else arr.unshift(d); write(arr); alert('Ficha guardada')}
function showList(){hideAll(); const arr=all(); let html='<h2>Mis fichas</h2>'; if(!arr.length) html+='<p class="muted">Aún no hay fichas guardadas.</p>'; arr.forEach(f=>{html+=`<div class="listItem">${f.cover_image?`<img class="listCover" src="${f.cover_image}" onclick="openById('${f.id}')">`:`<div class="listCoverEmpty" onclick="openById('${f.id}')">Sin portada</div>`}<div class="listBody" onclick="openById('${f.id}')"><h3>${escapeHtml(f.common_name||'Sin nombre')}</h3><div class="scientific">${escapeHtml(f.scientific_name||'')}</div><p class="muted">${labelCat(f.category)} · ${new Date(f.updated_at||f.created_at).toLocaleString()}</p></div><div class="row" style="padding:0 14px 14px"><button class="small" onclick="openById('${f.id}')">Abrir</button><button class="small danger" onclick="deleteById('${f.id}')">Eliminar</button></div></div>`}); html+='<button class="small" onclick="goHome()">← Volver</button>'; $('list').innerHTML=html; $('list').classList.remove('hidden')} function openById(id){const d=all().find(x=>x.id===id); if(d)openEditor(d)} function deleteById(id){if(!confirm('¿Eliminar esta ficha?'))return; write(all().filter(x=>x.id!==id)); showList()} function labelCat(v){return {pez_marino:'Pez marino',pez_dulce:'Pez dulce',coral:'Coral',invertebrado:'Invertebrado',planta:'Planta',microfauna:'Microfauna',sal:'Sal',medicamento:'Medicamento',alimento:'Alimento',equipamiento:'Equipamiento'}[v]||v}
function showPreview(){const d=collect(); hideAll(); const s=d.sections; $('preview').innerHTML=`${d.cover_image?`<img class="cover" src="${d.cover_image}">`:''}<h1>${escapeHtml(d.common_name||'Ficha sin nombre')}</h1><div class="scientific">${escapeHtml(d.scientific_name||'')}</div><p class="muted">${labelCat(d.category)}</p>${block('Resumen rápido',s.summary)}${block('Hábitat natural',s.habitat)}${block('Acuario recomendado',s.aquarium)}${block('Alimentación',s.feeding)}${block('Compatibilidad',s.compatibility)}${block('Salud',s.health)}${block('Antes de comprar',s.purchase)}${block('Errores frecuentes',s.mistakes)}${block('Curiosidades',s.curiosities)}${block('Fuentes',s.sources)}<button class="primary" onclick="openEditor(current)">← Editar</button>`; $('preview').classList.remove('hidden')} function block(t,c){return c?`<div class="section"><h2>${t}</h2><p>${escapeHtml(c).replace(/\n/g,'<br>')}</p></div>`:''} function escapeHtml(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function exportCurrent(){const d=collect(); const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=(d.common_name||'ficha').toLowerCase().replace(/[^a-z0-9áéíóúñ]+/gi,'-')+'.json'; a.click(); URL.revokeObjectURL(a.href)} if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})} goHome();
</script>
</body>
</html>
