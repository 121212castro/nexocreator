<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NexoCreator</title>
  <meta name="theme-color" content="#062033" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="NexoCreator" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/book-fish.svg" />
  <link rel="apple-touch-icon" href="icons/book-fish.svg" />
  <style>
    :root{--bg:#061927;--card:rgba(255,255,255,.105);--line:rgba(255,255,255,.18);--text:#f6fbff;--muted:#b8d3df;--accent:#25d0bd;--danger:#ff6b6b;--blue:#1495ff}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:radial-gradient(circle at top,#195c72 0,#062033 52%,#020b13 100%);color:var(--text);padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
    .app{max-width:860px;margin:0 auto;padding:22px}.top{text-align:center;padding:18px 0 10px}.logo{width:116px;height:116px;margin:auto;display:block}.title{font-size:42px;font-weight:900;letter-spacing:.02em;margin:8px 0 0}.sub{color:var(--muted);font-size:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:18px;margin:16px 0;box-shadow:0 18px 45px rgba(0,0,0,.22);backdrop-filter:blur(10px)}
    button,.btn{border:0;border-radius:18px;padding:15px 16px;font-size:18px;font-weight:750;color:var(--text);background:rgba(255,255,255,.14);width:100%;margin:7px 0;min-height:56px}.primary{background:linear-gradient(135deg,var(--accent),#18aee8);color:#02222b}.danger{background:rgba(255,107,107,.18);color:#ffd8d8}.small{font-size:14px;min-height:44px;padding:10px 12px;border-radius:14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.hidden{display:none!important}h2{font-size:28px;margin:8px 0 14px}.muted{color:var(--muted)}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:16px;background:rgba(0,0,0,.25);color:#fff;font-size:17px;padding:14px;margin:8px 0;outline:none}textarea{min-height:110px;resize:vertical}.cover{width:100%;max-height:280px;object-fit:cover;border-radius:22px;border:1px solid var(--line);background:rgba(0,0,0,.22)}.placeholder{height:210px;border:1px dashed var(--line);border-radius:22px;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:20px}.chipgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.chip{min-height:70px}.listItem{border:1px solid var(--line);border-radius:18px;padding:12px;margin:10px 0;background:rgba(0,0,0,.14)}.listItem h3{margin:0 0 4px;font-size:20px}.preview h1{font-size:32px;margin:12px 0 0}.scientific{font-style:italic;color:var(--muted);font-size:20px}.section{margin:18px 0;padding-top:12px;border-top:1px solid var(--line)}pre{white-space:pre-wrap;overflow:auto;background:rgba(0,0,0,.35);border-radius:16px;padding:14px;color:#dff7ff}.footerSpace{height:25px}@media(max-width:520px){.app{padding:16px}.title{font-size:36px}.row,.chipgrid{grid-template-columns:1fr 1fr}.chip{font-size:16px}.logo{width:102px;height:102px}}
  </style>
</head>
<body>
  <div class="app">
    <section id="home">
      <div class="top"><img class="logo" src="icons/book-fish.svg" alt="NexoCreator"><div class="title">NEXOCREATOR</div><div class="sub">Creador independiente de fichas humanas y JSON</div></div>
      <div class="card"><button class="primary" onclick="showNew()">➕ Nueva ficha</button><button onclick="showList()">📂 Mis fichas</button></div>
    </section>

    <section id="newMenu" class="hidden card">
      <h2>Nueva ficha</h2><p class="muted">Elige cómo empezar. La foto quedará como portada inicial de la ficha.</p>
      <label class="btn primary" for="cameraInput">📷 Hacer foto</label><input id="cameraInput" class="hidden" type="file" accept="image/*" capture="environment" onchange="startFromPhoto(event)">
      <label class="btn" for="galleryInput">🖼️ Elegir foto</label><input id="galleryInput" class="hidden" type="file" accept="image/*" onchange="startFromPhoto(event)">
      <button onclick="openEditor(newDraft())">✏️ Crear manualmente</button><button class="small" onclick="goHome()">← Volver</button>
    </section>

    <section id="editor" class="hidden">
      <div class="card"><h2>Editor de ficha</h2><div id="coverBox"></div>
        <div class="row"><label class="btn small" for="editorPhoto">🖼️ Cambiar foto</label><button class="small danger" onclick="removeCover()">🗑️ Borrar foto</button></div><input id="editorPhoto" class="hidden" type="file" accept="image/*" onchange="replaceCover(event)">
        <select id="category"><option value="pez_marino">🐠 Pez marino</option><option value="pez_dulce">🐟 Pez dulce</option><option value="coral">🪸 Coral</option><option value="invertebrado">🦐 Invertebrado</option><option value="planta">🌿 Planta</option><option value="microfauna">🧫 Microfauna</option><option value="sal">🧂 Sal</option><option value="medicamento">💊 Medicamento</option><option value="alimento">🍽️ Alimento</option><option value="equipamiento">⚙️ Equipamiento</option></select>
        <input id="commonName" placeholder="Nombre común"><input id="scientificName" placeholder="Nombre científico">
        <textarea id="summary" placeholder="Resumen rápido"></textarea><textarea id="habitat" placeholder="Hábitat natural"></textarea><textarea id="aquarium" placeholder="Acuario recomendado"></textarea><textarea id="feeding" placeholder="Alimentación"></textarea><textarea id="compatibility" placeholder="Compatibilidad"></textarea><textarea id="health" placeholder="Salud"></textarea><textarea id="purchase" placeholder="Antes de comprar"></textarea><textarea id="mistakes" placeholder="Errores frecuentes"></textarea><textarea id="curiosities" placeholder="Curiosidades"></textarea><textarea id="sources" placeholder="Fuentes"></textarea>
        <button class="primary" onclick="saveDraft()">💾 Guardar</button><div class="row"><button onclick="showPreview()">👁️ Vista humana</button><button onclick="exportCurrent()">📤 Exportar</button></div><button class="small" onclick="goHome()">← Volver</button></div>
    </section>

    <section id="list" class="hidden card"></section>
    <section id="preview" class="hidden card preview"></section>
    <div class="footerSpace"></div>
  </div>
<script>
const KEY='nexocreator_fichas_v1'; let current=null;
function $(id){return document.getElementById(id)} function hideAll(){['home','newMenu','editor','list','preview'].forEach(id=>$(id).classList.add('hidden'))} function goHome(){hideAll();$('home').classList.remove('hidden')} function showNew(){hideAll();$('newMenu').classList.remove('hidden')}
function all(){return JSON.parse(localStorage.getItem(KEY)||'[]')} function write(arr){localStorage.setItem(KEY,JSON.stringify(arr))}
function newDraft(){return {id:crypto.randomUUID?crypto.randomUUID():String(Date.now()),created_at:new Date().toISOString(),updated_at:new Date().toISOString(),category:'pez_marino',common_name:'',scientific_name:'',cover_image:'',sections:{summary:'',habitat:'',aquarium:'',feeding:'',compatibility:'',health:'',purchase:'',mistakes:'',curiosities:'',sources:''}}}
function readFile(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)})}
async function startFromPhoto(ev){const file=ev.target.files[0]; if(!file)return; const d=newDraft(); d.cover_image=await readFile(file); openEditor(d); ev.target.value=''}
async function replaceCover(ev){const file=ev.target.files[0]; if(!file)return; current.cover_image=await readFile(file); renderCover(); ev.target.value=''} function removeCover(){if(!current)return; current.cover_image=''; renderCover()}
function openEditor(d){current=d; hideAll(); $('editor').classList.remove('hidden'); $('category').value=d.category||'pez_marino'; $('commonName').value=d.common_name||''; $('scientificName').value=d.scientific_name||''; const s=d.sections||{}; ['summary','habitat','aquarium','feeding','compatibility','health','purchase','mistakes','curiosities','sources'].forEach(k=>$(k).value=s[k]||''); renderCover()}
function renderCover(){ $('coverBox').innerHTML=current&&current.cover_image?`<img class="cover" src="${current.cover_image}" alt="portada">`:`<div class="placeholder">Sin foto de portada</div>` }
function collect(){current.category=$('category').value; current.common_name=$('commonName').value.trim(); current.scientific_name=$('scientificName').value.trim(); current.updated_at=new Date().toISOString(); current.sections={summary:$('summary').value,habitat:$('habitat').value,aquarium:$('aquarium').value,feeding:$('feeding').value,compatibility:$('compatibility').value,health:$('health').value,purchase:$('purchase').value,mistakes:$('mistakes').value,curiosities:$('curiosities').value,sources:$('sources').value}; return current}
function saveDraft(){const d=collect(); let arr=all(); const i=arr.findIndex(x=>x.id===d.id); if(i>=0)arr[i]=d; else arr.unshift(d); write(arr); alert('Ficha guardada')}
function showList(){hideAll(); const arr=all(); let html='<h2>Mis fichas</h2>'; if(!arr.length) html+='<p class="muted">Aún no hay fichas guardadas.</p>'; arr.forEach((f,i)=>{html+=`<div class="listItem"><h3>${f.common_name||'Sin nombre'}</h3><div class="scientific">${f.scientific_name||''}</div><p class="muted">${labelCat(f.category)} · ${new Date(f.updated_at||f.created_at).toLocaleString()}</p><div class="row"><button class="small" onclick="openById('${f.id}')">Abrir</button><button class="small danger" onclick="deleteById('${f.id}')">Eliminar</button></div></div>`}); html+='<button class="small" onclick="goHome()">← Volver</button>'; $('list').innerHTML=html; $('list').classList.remove('hidden')}
function openById(id){const d=all().find(x=>x.id===id); if(d)openEditor(d)} function deleteById(id){if(!confirm('¿Eliminar esta ficha?'))return; write(all().filter(x=>x.id!==id)); showList()}
function labelCat(v){return {pez_marino:'Pez marino',pez_dulce:'Pez dulce',coral:'Coral',invertebrado:'Invertebrado',planta:'Planta',microfauna:'Microfauna',sal:'Sal',medicamento:'Medicamento',alimento:'Alimento',equipamiento:'Equipamiento'}[v]||v}
function showPreview(){const d=collect(); hideAll(); const s=d.sections; $('preview').innerHTML=`${d.cover_image?`<img class="cover" src="${d.cover_image}">`:''}<h1>${d.common_name||'Ficha sin nombre'}</h1><div class="scientific">${d.scientific_name||''}</div><p class="muted">${labelCat(d.category)}</p>${block('Resumen rápido',s.summary)}${block('Hábitat natural',s.habitat)}${block('Acuario recomendado',s.aquarium)}${block('Alimentación',s.feeding)}${block('Compatibilidad',s.compatibility)}${block('Salud',s.health)}${block('Antes de comprar',s.purchase)}${block('Errores frecuentes',s.mistakes)}${block('Curiosidades',s.curiosities)}${block('Fuentes',s.sources)}<button class="primary" onclick="openEditor(current)">← Editar</button>`; $('preview').classList.remove('hidden')}
function block(t,c){return c?`<div class="section"><h2>${t}</h2><p>${escapeHtml(c).replace(/\n/g,'<br>')}</p></div>`:''} function escapeHtml(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function exportCurrent(){const d=collect(); const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=(d.common_name||'ficha').toLowerCase().replace(/[^a-z0-9áéíóúñ]+/gi,'-')+'.json'; a.click(); URL.revokeObjectURL(a.href)}
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
goHome();
</script>
</body>
</html>
