<!doctype html><html lang="es"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" /><title>NexoCreator</title><meta name="theme-color" content="#062033" /><meta name="apple-mobile-web-app-capable" content="yes" /><meta name="apple-mobile-web-app-title" content="NexoCreator" /><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" /><link rel="manifest" href="manifest.webmanifest" /><link rel="icon" href="icons/book-fish.svg" /><link rel="apple-touch-icon" href="icons/book-fish.svg" /><link rel="stylesheet" href="assets/css/styles.css" /></head><body><div class="app">...</div><script src="assets/js/app.js"></script><script>function showList(){hideAll(); const arr=all(); let html='<h2>Mis fichas</h2>'; if(!arr.length) html+='<p class="muted">Aún no hay fichas guardadas.</p>'; arr.forEach(f=>{html+=`<div class="listItem">${f.cover_image?`<img class="listCover" src="${f.cover_image}" onclick="openById('${f.id}')">`:`<div class="listCoverEmpty" onclick="openById('${f.id}')">Sin portada</div>`}<div class="listBody" onclick="openById('${f.id}')"><h3>${escapeHtml(f.common_name||'Sin nombre')}</h3><div class="scientific">${escapeHtml(f.scientific_name||'')}</div><p><strong>${escapeHtml(f.status||'BORRADOR')}</strong></p><p class="muted">${labelCat(f.category)} · ${new Date(f.updated_at||f.created_at).toLocaleString()}</p></div></div>`}); html+='<button class="small" onclick="goHome()">← Volver</button>'; $('list').innerHTML=html; $('list').classList.remove('hidden')}window.showList=showList;</script></body></html>
