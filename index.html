<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NexoCreator</title>
  <meta name="theme-color" content="#062033" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/book-fish.svg" />
  <link rel="apple-touch-icon" href="icons/book-fish.svg" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="app">
    <section id="home">
      <div class="top">
        <img class="logo" src="icons/book-fish.svg">
        <h1 class="title">NexoCreator</h1>
        <p class="sub">Creador de fichas</p>
      </div>
      <div class="card">
        <button class="primary" onclick="showNew()">➕ Nueva ficha</button>
        <button onclick="showList()">📚 Mis fichas</button>
        <button onclick="refreshApp()">Refrescar app</button>
        <input id="photoStarter" type="file" accept="image/*" onchange="startFromPhoto(event)">
      </div>
    </section>

    <section id="newMenu" class="hidden card">
      <h2>Nueva ficha</h2>
      <button class="primary" onclick="openEditor(newDraft())">Crear ficha vacía</button>
      <button class="small" onclick="goHome()">← Volver</button>
    </section>

    <section id="editor" class="hidden">
      <div class="card">
        <div id="coverBox"></div>
        <input type="file" accept="image/*" onchange="replaceCover(event)">
        <button onclick="removeCover()">Quitar portada</button>
        <select id="category">
          <option value="pez_marino">Pez marino</option>
          <option value="pez_dulce">Pez dulce</option>
          <option value="coral">Coral</option>
          <option value="invertebrado">Invertebrado</option>
          <option value="planta">Planta</option>
          <option value="microfauna">Microfauna</option>
          <option value="sal">Sal</option>
          <option value="medicamento">Medicamento</option>
          <option value="alimento">Alimento</option>
          <option value="equipamiento">Equipamiento</option>
        </select>
        <input id="commonName" placeholder="Nombre común">
        <input id="scientificName" placeholder="Nombre científico">
        <textarea id="summary" placeholder="Resumen"></textarea>
        <textarea id="habitat" placeholder="Hábitat"></textarea>
        <textarea id="aquarium" placeholder="Acuario recomendado"></textarea>
        <textarea id="feeding" placeholder="Alimentación"></textarea>
        <textarea id="compatibility" placeholder="Compatibilidad"></textarea>
        <textarea id="health" placeholder="Salud"></textarea>
        <textarea id="purchase" placeholder="Antes de comprar"></textarea>
        <textarea id="mistakes" placeholder="Errores frecuentes"></textarea>
        <textarea id="curiosities" placeholder="Curiosidades"></textarea>
        <textarea id="sources" placeholder="Fuentes"></textarea>
        <button class="primary" onclick="saveDraft()">Guardar</button>
        <button onclick="showPreview()">Vista previa</button>
        <button onclick="exportCurrent()">Exportar JSON</button>
        <button class="small" onclick="goHome()">← Inicio</button>
      </div>
    </section>

    <section id="list" class="hidden card"></section>
    <section id="preview" class="hidden card preview"></section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.ACUARIONEXO_CONFIG = {
      SUPABASE_URL: "https://fpykunamxygclolnjnke.supabase.co",
      SUPABASE_KEY: "sb_publishable_FICmG_EDURKDibSrG0R2EA_kRqaHNe-"
    };
  </script>
  <script src="assets/js/app.js"></script>
  <script>
    async function deleteFicha(id) {
      if (!confirm('¿Borrar esta ficha?')) return;

      const c = window.supabase.createClient(
        window.ACUARIONEXO_CONFIG.SUPABASE_URL,
        window.ACUARIONEXO_CONFIG.SUPABASE_KEY
      );

      const { error } = await c.from('fichas_creator').delete().eq('id', id);

      if (error) {
        alert('No se pudo borrar: ' + (error.message || JSON.stringify(error)));
        return;
      }

      await showList();
    }

    function sectionFinal(title, content) {
      if (!content) return '';
      return '<section class="section fichaFinalSection"><h2>' + escapeHtml(title) + '</h2><p>' + escapeHtml(content).replace(/\n/g, '<br>') + '</p></section>';
    }

    function renderFichaFinal(draft) {
      const sections = draft.sections || {};

      return '' +
        '<article class="fichaFinal">' +
          (draft.cover_image ? '<img class="cover" src="' + draft.cover_image + '" alt="portada de ficha">' : '<div class="placeholder">Sin foto de portada</div>') +
          '<h1>' + escapeHtml(draft.common_name || 'Ficha sin nombre') + '</h1>' +
          '<div class="scientific">' + escapeHtml(draft.scientific_name || '') + '</div>' +
          '<p class="muted">' + escapeHtml(labelCat(draft.category)) + ' · Estado: ' + escapeHtml(labelStatus(draft.status)) + '</p>' +
          sectionFinal('Resumen rápido', sections.summary) +
          sectionFinal('Hábitat natural', sections.habitat) +
          sectionFinal('Acuario recomendado', sections.aquarium) +
          sectionFinal('Alimentación', sections.feeding) +
          sectionFinal('Compatibilidad', sections.compatibility) +
          sectionFinal('Salud', sections.health) +
          sectionFinal('Antes de comprar', sections.purchase) +
          sectionFinal('Errores frecuentes', sections.mistakes) +
          sectionFinal('Curiosidades', sections.curiosities) +
          sectionFinal('Fuentes', sections.sources) +
        '</article>';
    }

    async function openFinalById(id) {
      const c = window.supabase.createClient(
        window.ACUARIONEXO_CONFIG.SUPABASE_URL,
        window.ACUARIONEXO_CONFIG.SUPABASE_KEY
      );

      const { data, error } = await c
        .from('fichas_creator')
        .select('*')
        .eq('id', id)
        .single();

      if (error || !data) {
        alert('No se pudo abrir la ficha: ' + ((error && error.message) || 'sin datos'));
        return;
      }

      const draft = rowToDraft(data);
      window.current = draft;
      current = draft;

      hideAll();
      $('preview').innerHTML =
        '<button class="small" onclick="showList()">← Mis fichas</button>' +
        renderFichaFinal(draft) +
        '<button class="primary" onclick="openEditor(window.current)">✏️ Editar ficha</button>' +
        '<button class="small danger" onclick="deleteFicha(\'' + draft.id + '\')">🗑️ Borrar</button>';
      $('preview').classList.remove('hidden');
    }

    async function showList() {
      hideAll();
      $('list').innerHTML = '<h2>Mis fichas</h2><p class="muted">Cargando...</p>';
      $('list').classList.remove('hidden');

      const arr = await all();
      let html = '<h2>Mis fichas</h2>';

      if (!arr.length) {
        html += '<p class="muted">Aún no hay fichas guardadas.</p>';
      }

      arr.forEach(function(f) {
        const cover = f.cover_image
          ? '<img class="listCover" src="' + f.cover_image + '" alt="portada">'
          : '<div class="listCoverEmpty">Sin portada</div>';

        html += '' +
          '<div class="listItem">' +
            '<div onclick="openFinalById(\'' + f.id + '\')">' +
              cover +
              '<div class="listBody">' +
                '<h3>' + escapeHtml(f.common_name || 'Sin nombre') + '</h3>' +
                '<p class="muted">' + escapeHtml(f.scientific_name || '') + '</p>' +
                '<p class="muted">' + escapeHtml(labelCat(f.category)) + ' · ' + escapeHtml(labelStatus(f.status)) + '</p>' +
                '<button class="primary small" onclick="event.stopPropagation();openFinalById(\'' + f.id + '\')">Ver ficha final</button>' +
                '<button class="small danger" onclick="event.stopPropagation();deleteFicha(\'' + f.id + '\')">🗑️ Borrar</button>' +
              '</div>' +
            '</div>' +
          '</div>';
      });

      html += '<button class="small" onclick="goHome()">← Volver</button>';
      $('list').innerHTML = html;
    }

    async function saveDraftAndShowList() {
      const draft = collect();
      const saved = await saveFicha(draft);
      if (saved) await showList();
    }

    window.deleteFicha = deleteFicha;
    window.showList = showList;
    window.openFinalById = openFinalById;
    window.renderFichaFinal = renderFichaFinal;
    window.saveDraft = saveDraftAndShowList;

    function refreshApp() {
      location.reload();
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    goHome();
  </script>
</body>
</html>
